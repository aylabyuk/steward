name: Auto-merge release PRs

# Self-hosted replacement for GitHub's built-in auto-merge, which is
# gated behind Pro on private repos. Triggers on CI completion; if the
# PR's title starts with `chore(release):` or `Release:` AND CI
# succeeded, merges the PR automatically. Feature PRs are NOT affected
# — they still need a human review + click.
#
# The release workflow (.github/workflows/release.yml) takes over from
# here once main is pushed.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: auto-merge-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  auto-merge:
    name: Merge release PR on green CI
    # Only run if CI succeeded. Skip for failure/cancelled/timed-out.
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # `actions: write` lets `gh workflow run` dispatch the Release
      # workflow after merging a main-bound PR. Without it the
      # dispatch step fails with HTTP 403 "Resource not accessible by
      # integration" and the Release workflow never fires.
      actions: write
    steps:
      - name: Resolve + merge matching PR
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Find the open PR for this head branch. There's usually exactly one.
          PR_JSON=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number,title,baseRefName,headRefOid,mergeable,mergeStateStatus)

          MATCH=$(echo "$PR_JSON" | jq -r \
            --arg sha "$HEAD_SHA" \
            '[.[] | select(.headRefOid == $sha) |
              select(.title | test("^chore\\(release\\):|^Release:"))]
             | .[0]')

          if [ "$MATCH" = "null" ] || [ -z "$MATCH" ]; then
            echo "No matching release PR for branch $HEAD_BRANCH @ $HEAD_SHA — nothing to auto-merge."
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER=$(echo "$MATCH" | jq -r '.number')
          BASE=$(echo "$MATCH" | jq -r '.baseRefName')

          echo "Auto-merging PR #$PR_NUMBER ($HEAD_BRANCH → $BASE)"
          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --merge \
            --delete-branch

          echo "merged=true" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      # The merge above was performed by GITHUB_TOKEN, which suppresses
      # downstream push-trigger workflows. Explicitly dispatch the
      # Release workflow when the merged PR targeted main — that's the
      # one that tags + deploys.
      - name: Trigger Release workflow
        if: steps.merge.outputs.merged == 'true' && steps.merge.outputs.base == 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Dispatching Release workflow on main"
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref main
