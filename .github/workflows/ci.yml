name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide which expensive jobs actually need to run. Docs-only PRs
  # (changelog prose, CLAUDE.md, docs/**, .claude/**) shouldn't pay
  # for a 10-minute lint + typecheck + Vitest + Playwright cycle.
  # This job ALWAYS runs and always succeeds, so the overall
  # workflow conclusion stays `success` for auto-merge + required
  # status checks, even when the two downstream jobs skip.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    # dorny/paths-filter calls the PR listFiles API for pull_request
    # events. Needs pull-requests: read because the default
    # GITHUB_TOKEN scope on this repo doesn't include it.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
      functions: ${{ steps.filter.outputs.functions }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'public/**'
              - 'scripts/**'
              - 'e2e/**'
              - 'tests/**'
              - 'functions/**'
              - 'firestore.rules'
              - 'firestore.indexes.json'
              - 'firebase.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'vite.config.ts'
              - 'vitest.config.ts'
              - 'vitest.rules.config.ts'
              - 'playwright.config.ts'
              - 'playwright.emulators.config.ts'
              - 'tsconfig*.json'
              - 'biome.json'
              - 'vercel.json'
              - 'index.html'
              - '.github/workflows/ci.yml'
            functions:
              - 'functions/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'

  ci:
    name: lint · format · typecheck · test · build · e2e
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      # Firebase web config is public — these are the dev project's values.
      # Security boundary is Firestore rules, not the API key.
      VITE_FIREBASE_API_KEY: AIzaSyBeBECZlT1Rye3GL-usPr4KsdCHNumJyEE
      VITE_FIREBASE_AUTH_DOMAIN: steward-dev-5e4dc.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: steward-dev-5e4dc
      VITE_FIREBASE_STORAGE_BUCKET: steward-dev-5e4dc.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: "159630054981"
      VITE_FIREBASE_APP_ID: 1:159630054981:web:b95053f12fcfa9e7ea752c
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Format check (Biome)
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Build
        run: pnpm build

      # Cache the downloaded browser binaries (~150MB chromium). Key
      # invalidates on any pnpm-lock change — coarse but the simplest
      # signal that picks up Playwright version bumps. On cache hit the
      # next step skips the download and only runs install-deps for the
      # apt packages (system deps don't carry across runner images).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers + deps (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: E2E tests (Playwright)
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Rules tests live in their own job so they parallelise with the
  # build/e2e critical path. They need Java for the Firebase emulator,
  # which the rest of the workflow doesn't touch — keeping it isolated
  # also avoids paying the ~10s setup-java cost on every PR that
  # doesn't change rules.
  rules:
    name: rules · firestore emulator
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rules tests (Firestore emulator)
        run: pnpm test:rules

  functions:
    name: functions · build · test
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build functions
        run: pnpm --filter @steward/functions build

      - name: Test functions
        run: pnpm --filter @steward/functions test
