name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · format · typecheck · test · build · e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      # Firebase web config is public — these are the dev project's values.
      # Security boundary is Firestore rules, not the API key.
      VITE_FIREBASE_API_KEY: AIzaSyBeBECZlT1Rye3GL-usPr4KsdCHNumJyEE
      VITE_FIREBASE_AUTH_DOMAIN: steward-dev-5e4dc.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: steward-dev-5e4dc
      VITE_FIREBASE_STORAGE_BUCKET: steward-dev-5e4dc.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: "159630054981"
      VITE_FIREBASE_APP_ID: 1:159630054981:web:b95053f12fcfa9e7ea752c
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Format check (Biome)
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Rules tests (Firestore emulator)
        run: pnpm test:rules

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  functions:
    name: functions · build · test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build functions
        run: pnpm --filter @steward/functions build

      - name: Test functions
        run: pnpm --filter @steward/functions test
