<!doctype html>
<html lang="en" data-screen-label="Program · Sunday May 10">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Steward · Program — Sun May 10, 2026</title>
<link rel="icon" type="image/svg+xml" href="assets/logo-monogram.svg">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="program.css?v=4">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/hymns.jsx"></script>
<script type="text/babel" src="components/ProgramPage.jsx"></script>

<script type="text/babel">

const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "statusMode": "icon",
  "density": "roomy"
}/*EDITMODE-END*/;

const INITIAL = {
  date: new Date(2026, 4, 10), // Sunday, May 10, 2026
  presiding: "",
  conducting: "",
  prayers: {
    opening: { name: "", status: "unconfirmed" },
    closing: { name: "", status: "unconfirmed" },
  },
  music: {
    chorister: { name: "", status: "unconfirmed" },
    pianist:   { name: "", status: "unconfirmed" },
  },
  sacrament: {
    bread:    { name: "", status: "unconfirmed" },
    blesser1: { name: "", status: "unconfirmed" },
    blesser2: { name: "", status: "unconfirmed" },
  },
  speakers: [
    { name: "Brother Micah Yardley", topic: "Enduring to the end", state: "confirmed" },
  ],
  hymns: {
    opening:   { number: null, title: "" },
    sacrament: { number: null, title: "" },
    closing:   { number: null, title: "" },
  },
  mid: {
    // "rest" | "musical" | "none"
    mode: "rest",
    rest: { number: null, title: "" },
    musical: { performer: "" },
  },
  notes: {
    ward: "",
    stake: "",
    announcements: "",
    showAnnouncements: true,
  },
  comments: [],
};

function Tweaks({ tweaks, setTweak }) {
  const [open, setOpen] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setOpen(true);
      else if (e.data.type === "__deactivate_edit_mode") setOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  if (!open) return null;
  return (
    <div className="tweaks">
      <div className="tweaks__head">
        <span className="tweaks__title">Tweaks</span>
        <span style={{marginLeft:"auto", fontFamily:"var(--font-mono)", fontSize:9, letterSpacing:".14em", textTransform:"uppercase", color:"var(--brass-deep)"}}>Program</span>
      </div>
      <div className="tweaks__row">
        <div className="tweaks__label">Status control</div>
        <div className="tweaks__seg">
          <button className={tweaks.statusMode === "icon" ? "is-on" : ""} onClick={() => setTweak("statusMode", "icon")}>Icon</button>
          <button className={tweaks.statusMode === "dropdown" ? "is-on" : ""} onClick={() => setTweak("statusMode", "dropdown")}>Dropdown</button>
        </div>
      </div>
      <div className="tweaks__row">
        <div className="tweaks__label">Density</div>
        <div className="tweaks__seg">
          <button className={tweaks.density === "roomy" ? "is-on" : ""} onClick={() => setTweak("density", "roomy")}>Roomy</button>
          <button className={tweaks.density === "compact" ? "is-on" : ""} onClick={() => setTweak("density", "compact")}>Compact</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(() => ({ ...TWEAK_DEFAULS }));
  const setTweak = (k, v) => {
    setTweaks((t) => ({ ...t, [k]: v }));
    try {
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
    } catch (e) {}
  };

  return (
    <div
      className="app"
      data-status-mode={tweaks.statusMode}
      data-density={tweaks.density}
    >
      <ProgramPage initial={INITIAL}/>
      <Tweaks tweaks={tweaks} setTweak={setTweak}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
